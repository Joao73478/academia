</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black">

<div class="container">

<a class="navbar-brand" href="#">
<img src="img/logo.png" style="width:120px">
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<section class="banner">

<img src="img/OIP.webp">

<h1>Fitness Center</h1>
<p>Treine com os melhores profissionais</p>

</section>

<section class="form-container">

<h2>Faça sua Matrícula</h2>

<form id="form">

<div class="campo">
<label>Nome do Aluno</label>
<input type="text" id="nome" required>
</div>

<div class="campo">
<label>Plano</label>

<select id="plano">
<option>Mensal</option>
<option>Trimestral</option>
<option>Anual</option>
</select>

</div>

<div class="campo">
<label>Tipo de Treino</label>

<select id="treino">
<option>Musculação</option>
<option>Funcional</option>
<option>Cardio</option>
</select>

</div>

<div class="campo">
<label>Professor</label>

<select id="professor">
<option>Carlos Silva</option>
<option>Marcos Oliveira</option>
<option>Ana Souza</option>
</select>

</div>

<button type="submit">
Realizar Matrícula
</button>

</form>

</section>

<footer>

<p>Fitness Center © 2026</p>

</footer>

<script src="js/scripts.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
