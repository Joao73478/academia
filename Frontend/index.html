<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Center</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header class="navbar">

<img src="img/logo.png" class="logo">

<nav>

<a href="index.html">Cadastro</a>
<a href="dashboard.html">Gerenciar Matrículas</a>

</nav>

</header>

<section class="banner">

<img src="img/OIP.webp">

<h1>Fitness Center</h1>
<p>Treine com os melhores profissionais</p>

</section>

<section class="form-container">

<h2>Faça sua Matrícula</h2>

<form id="form">

<div class="campo">
<label>Nome do Aluno</label>
<input type="text" id="nome" required>
</div>

<div class="campo">
<label>Plano</label>

<select id="plano">
<option>Mensal</option>
<option>Trimestral</option>
<option>Anual</option>
</select>

</div>

<div class="campo">
<label>Tipo de Treino</label>

<select id="treino">
<option>Musculação</option>
<option>Funcional</option>
<option>Cardio</option>
</select>

</div>

<div class="campo">
<label>Professor</label>

<select id="professor">
<option>Carlos Silva</option>
<option>Marcos Oliveira</option>
<option>Ana Souza</option>
</select>

</div>

<button type="submit">

Realizar Matrícula

</button>

</form>

</section>

<footer>

<p>Fitness Center © 2026</p>

</footer>

<script src="js/scripts.js"></script>

</body>
</html>
